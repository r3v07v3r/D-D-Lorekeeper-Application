<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="256" height="256" rx="48" fill="#0f172a"/>
  <rect x="10" y="10" width="236" height="236" rx="42" fill="url(#bg)"/>

  <!-- d20 outline: hexagon body with facet lines, classic tabletop icon -->
  <g stroke="#f8fafc" stroke-width="7" stroke-linejoin="round" fill="none">
    <polygon points="128,32 210,80 210,176 128,224 46,176 46,80" fill="#1e1b4b" fill-opacity="0.35"/>
    <line x1="128" y1="32" x2="128" y2="90"/>
    <line x1="128" y1="166" x2="128" y2="224"/>
    <line x1="46" y1="80" x2="94" y2="108"/>
    <line x1="162" y1="148" x2="210" y2="176"/>
    <line x1="210" y1="80" x2="162" y2="108"/>
    <line x1="94" y1="148" x2="46" y2="176"/>
  </g>

  <!-- bold monogram, legible down to favicon size -->
  <text x="128" y="164" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="112" font-weight="700" fill="#f8fafc">L</text>
</svg>
