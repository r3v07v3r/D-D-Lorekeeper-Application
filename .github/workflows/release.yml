# Runs on every push to main. Every merge gets its own released version,
# auto-incremented rather than requiring someone to hand-edit
# electron/package.json before merging:
#   - If the committed version doesn't have a GitHub release yet, this is
#     a version bumped intentionally ahead of time (or the very first
#     release) - build and publish it as-is.
#   - If it already has a release, this merge needs a new version: bump it
#     (patch by default), push that bump straight to main for the repo's
#     own history/next-run bookkeeping, and *continue building in this same
#     run* using the bumped version - a push authenticated with the default
#     GITHUB_TOKEN deliberately does NOT trigger other workflow runs (GitHub's
#     built-in loop prevention), so waiting for a second, bump-triggered run
#     to do the real build would just silently never happen. Learned this
#     the hard way: the first version of this workflow bumped v1.2.0 to
#     v1.3.0, pushed it, and then nothing built - the push never triggered
#     anything.
#   - The bump defaults to patch. Include "[minor]" or "[major]" anywhere
#     in the merge commit message (e.g. in the PR title, since that's what
#     `gh pr merge --merge` carries into the merge commit) to bump that
#     part of semver instead.
#
# electron/package.json's build.publish.releaseType is deliberately set to
# "release" (electron-builder's default is "draft"). A draft doesn't create
# a real git tag until someone manually publishes it, which would silently
# break both the "already released" check above (next push wouldn't see the
# version as released and would rebuild/republish it) and the app's
# auto-updater (which only looks at the latest *published* release) -
# learned the hard way when the first real run of this workflow left
# v1.2.0 sitting unpublished with no tag.
name: Build and release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")

          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION\$"; then
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if echo "$COMMIT_MSG" | grep -qi '\[major\]'; then
              BUMP=major
            elif echo "$COMMIT_MSG" | grep -qi '\[minor\]'; then
              BUMP=minor
            else
              BUMP=patch
            fi

            echo "v$VERSION is already released - bumping ($BUMP) for this merge."
            (cd electron && npm version "$BUMP" --no-git-tag-version)
            VERSION=$(node -p "require('./electron/package.json').version")

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add electron/package.json electron/package-lock.json
            git commit -m "chore(release): bump version to v$VERSION"
            git push
          else
            echo "No release for v$VERSION yet - building this version."
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: check-version
    runs-on: windows-latest
    steps:
      # Explicitly pins to main's current tip, not the commit that triggered
      # this run - if check-version just bumped and pushed, that bump commit
      # is what needs to be built, not the pre-bump commit this workflow
      # actually started from.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure ffmpeg is available
        shell: bash
        run: ffmpeg -version || choco install ffmpeg -y

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt
          pip install -r requirements-dev.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

      - name: Build backend executable
        working-directory: backend
        run: python build_backend.py

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check and build frontend
        working-directory: frontend
        run: npm run build

      - name: Install electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build and publish release
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis --publish always
